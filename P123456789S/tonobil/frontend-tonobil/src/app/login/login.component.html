<div class="login-container">
  <div class="login-card">
    <h2>Welcome Back</h2>
    <p>Sign in to your account</p>

    <div *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" [(ngModel)]="credentials.email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" [(ngModel)]="credentials.password" required>
      </div>
      <button type="submit" class="btn-primary" [disabled]="!loginForm.form.valid">Login</button>
    </form>

    <div class="divider"><span>OR</span></div>

    <a href="http://localhost:8080/oauth2/authorization/google" class="btn-google">
      <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google Logo" class="g-logo">
      Sign in with Google
    </a>

    <p class="signup-link">Don't have an account? <a routerLink="/signup">Sign up</a></p>
  </div>
</div>
