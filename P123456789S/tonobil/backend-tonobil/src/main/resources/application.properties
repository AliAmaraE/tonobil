spring.application.name=backend-tonobil

# PostgreSQL connection settings
spring.datasource.url=jdbc:postgresql://localhost:5432/tonobil_db
spring.datasource.username=tonobil_user
spring.datasource.password=tonobil_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Google OAuth2 Configuration (Replace with your actual keys)
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=profile,email

# Frontend URL for CORS and redirects
frontend.url=http://localhost:4200
