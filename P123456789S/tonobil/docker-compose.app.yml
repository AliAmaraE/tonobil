services:
  db:
    image: postgres:15
    container_name: postgres_tonobil
    environment:
      POSTGRES_USER: tonobil_user
      POSTGRES_PASSWORD: tonobil_password
      POSTGRES_DB: tonobil_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_tonobil_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tonobil_user -d tonobil_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend-tonobil
    image: tonobil-backend:local
    container_name: backend_tonobil
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tonobil_db
      SPRING_DATASOURCE_USERNAME: tonobil_user
      SPRING_DATASOURCE_PASSWORD: tonobil_password
      FRONTEND_URL: http://localhost:4200
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/services?carId=1 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: ./frontend-tonobil
    image: tonobil-frontend:local
    container_name: frontend_tonobil
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4200:80"

volumes:
  postgres_tonobil_data:
